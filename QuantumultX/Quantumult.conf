[general]
server_check_url = http://cp.cloudflare.com/generate_204
network_check_url = http://wifi.vivo.com.cn/generate_204
dns_exclusion_list = *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, *.alipay.com, *.tmall.com, *.qq.com, id6.me
fallback_udp_policy = reject

[dns]
no-ipv6
no-system
server = 223.5.5.5
server = 119.29.29.29
doh-server = https://doh.pub/dns-query, https://dns.alidns.com/dns-query

[policy]
static=Hong Kong, resource-tag-regex=.*, server-tag-regex=🇭🇰|港|HK|Hong|hong|香港
static=Taiwan, resource-tag-regex=.*, server-tag-regex=🇹🇼|台|TW|Tai|Taiwan|台湾|台灣
static=Singapore, resource-tag-regex=.*, server-tag-regex=🇸🇬|新加坡|坡|狮城|SG|Singapore
static=United States, resource-tag-regex=.*, server-tag-regex=🇺🇸|美|洛杉矶|圣何塞|圣克拉拉|西雅图|硅谷|US|USA|美国
static=Netflix, Singapore, Hong Kong, Taiwan
static=YouTube, United States, Singapore, Hong Kong, Taiwan
static=Spotify, Hong Kong, Singapore, United States, Taiwan, direct

[server_remote]

[filter_remote]
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Apple/Apple.list, tag=Apple, force-policy=direct, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Netflix/Netflix.list, tag=Netflix, force-policy=Netflix, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Spotify/Spotify.list, tag=Spotify, force-policy=Spotify, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/YouTube/YouTube.list, tag=YouTube, force-policy=YouTube, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/YouTubeMusic/YouTubeMusic.list, tag=YouTubeMusic, force-policy=YouTube, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/OpenAI/OpenAI.list, tag=OpenAI, force-policy=United States, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Claude/Claude.list, tag=Claude, force-policy=United States, update-interval=86400, opt-parser=false, enabled=true
https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX/Google/Google.list, tag=Google, force-policy=Taiwan, update-interval=86400, opt-parser=false, enabled=true
FILTER_REGION, tag=CN, force-policy=direct, inserted-resource=true, enabled=true
FILTER_LAN, tag=LAN, force-policy=direct, inserted-resource=true, enabled=true

[filter_local]
host-suffix, push.apple.com, Hong Kong
host-keyword, courier, Hong Kong
final, Proxy

[server_local]
